      control-plane: controller-manager
      k8s-app: coredns-operator
  template:
    metadata:
      labels:
        control-plane: controller-manager
        k8s-app: coredns-operator
    spec:
      # Added
      serviceAccountName: coredns-operator
      containers:
      - args:
        - --enable-leader-election
        command:
        - /manager
        image: justinsb/coredns-operator:latest
        name: manager
        resources:
          limits:
            memory: 100Mi
          requests:
            cpu: 100m
            memory: 20Mi
      terminationGracePeriodSeconds: 10
